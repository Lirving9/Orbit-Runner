<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#07080b">
    <title>Orbit Runner</title>
    <meta name="description" content="Orbit Runner — a fast-paced 60-second space survival game.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Orbit Runner">
      <canvas id="gameCanvas" aria-label="Orbit Runner game canvas"></canvas>

      <section class="hud" aria-label="Game stats">
        <div class="stat"><span class="stat-label">SCORE</span><strong id="scoreValue">0</strong></div>
        <div class="stat"><span class="stat-label">BEST</span><strong id="bestValue">0</strong></div>
        <div class="stat"><span class="stat-label">TIME</span><strong id="timeValue">60</strong></div>
        <div class="meter" aria-label="Shield">
          <span class="stat-label">SHIELD</span>
          <div class="meter-track"><span id="shieldBar"></span></div>
        </div>
      </section>
      <div class="status-badges" id="statusBadges">
        <div class="badge badge-bomb is-hidden" id="bombBadge">💣 <span id="bombCount">0</span></div>
        <div class="badge badge-magnet is-hidden" id="magnetBadge">🧲 <span id="magnetTimer">0s</span></div>
        <div class="badge badge-boost is-hidden" id="boostBadge">⚡ <span id="boostTimerBadge">0s</span></div>
      </div>

      <div class="top-actions">
        <button class="icon-button" id="soundBtn" type="button" aria-label="Sound" title="Sound">🔊</button>
        <button class="icon-button" id="pauseButton" type="button" aria-label="Pause" title="Pause">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14M16 5v14"></path></svg>
        </button>
      </div>

      <div class="toast is-hidden" id="toast"></div>
      <div class="wave-label is-hidden" id="waveLabel"></div>
      <div class="combo-label is-hidden" id="comboLabel"></div>

      <section class="modal-panel" id="startPanel" aria-label="Start game">
        <p class="kicker">60 SECOND RUN</p>
        <h1>Orbit Runner</h1>
        <div class="diff-row">
          <button class="diff-btn" data-diff="easy">EASY</button>
          <button class="diff-btn is-active" data-diff="normal">NORMAL</button>
          <button class="diff-btn" data-diff="hard">HARD</button>
        </div>
        <button class="play-button" id="startButton" type="button" aria-label="Start" title="Start">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4.8v14.4L18.5 12 7 4.8Z"></path></svg>
        </button>
        <p class="hint">WASD / Arrows · Space pause · B bomb</p>
      </section>

      <section class="modal-panel is-hidden" id="endPanel" aria-label="Run result">
        <p class="kicker" id="resultLabel">RUN COMPLETE</p>
        <div class="grade-row"><span class="grade" id="gradeLabel">A</span></div>
        <h2 id="finalScore">0</h2>
        <div class="result-grid">
          <div><span class="stat-label">BEST</span><strong id="finalBest">0</strong></div>
          <div><span class="stat-label">COMBO</span><strong id="finalCombo">0</strong></div>
          <div><span class="stat-label">SHARDS</span><strong id="finalShards">0</strong></div>
          <div><span class="stat-label">DODGED</span><strong id="finalDodged">0</strong></div>
        </div>
        <button class="play-button" id="restartButton" type="button" aria-label="Restart" title="Restart">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7M3 4.5v5h5"></path></svg>
        </button>
      </section>

      <nav class="touch-controls" aria-label="Touch controls">
        <button class="touch-button" id="leftButton" type="button" aria-label="Left">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 6-6 6 6 6"></path></svg>
        </button>
        <button class="touch-button thrust" id="thrustButton" type="button" aria-label="Thrust">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"></path></svg>
        </button>
        <button class="touch-button" id="rightButton" type="button" aria-label="Right">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 6 6 6-6 6"></path></svg>
        </button>
      </nav>
    </main>
    <script src="game.js"></script>
  </body>
</html>
