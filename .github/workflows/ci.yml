name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check game.js
        run: node --check game.js

      - name: Validate manifest.webmanifest
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.webmanifest','utf8'))"
